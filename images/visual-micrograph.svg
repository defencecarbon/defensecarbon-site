<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="microscope fracture analysis">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06172e"/><stop offset="0.55" stop-color="#0a2f5c"/><stop offset="1" stop-color="#030814"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#24d2ff"/><stop offset="1" stop-color="#0a62c8"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#51647b"/><stop offset="0.28" stop-color="#d7e7f3"/><stop offset="0.55" stop-color="#73869c"/><stop offset="1" stop-color="#f2f7fb"/></linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff2b5"/><stop offset="0.45" stop-color="#ff9b35"/><stop offset="1" stop-color="#ff4b1f"/></linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0v44" fill="none" stroke="#7ec9ff" stroke-opacity=".13" stroke-width="1"/></pattern>
    <pattern id="carbon" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(35)"><rect width="9" height="18" fill="#101a28"/><rect x="9" width="9" height="18" fill="#192b42"/></pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity=".38"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="760" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="760" rx="34" fill="url(#grid)"/>

  <g transform="translate(120 115)" filter="url(#shadow)">
    <rect x="0" y="0" width="570" height="430" rx="28" fill="#071120" stroke="#75dfff" stroke-opacity=".36"/>
    <rect x="44" y="48" width="482" height="334" rx="18" fill="#dce8f1"/>
    <g transform="translate(70 75)">
      <rect x="0" y="0" width="200" height="135" fill="#aebcca"/>
      <rect x="210" y="0" width="200" height="135" fill="#ccd8e4"/>
      <rect x="0" y="145" width="200" height="135" fill="#8b9baa"/>
      <rect x="210" y="145" width="200" height="135" fill="#718394"/>
      <g fill="#25384b" opacity=".55">
        <circle cx="30" cy="42" r="18"/><circle cx="85" cy="78" r="24"/><circle cx="152" cy="38" r="13"/><circle cx="167" cy="104" r="20"/>
        <circle cx="242" cy="46" r="16"/><circle cx="304" cy="84" r="26"/><circle cx="370" cy="55" r="22"/><circle cx="344" cy="112" r="15"/>
        <circle cx="62" cy="188" r="26"/><circle cx="128" cy="226" r="18"/><circle cx="173" cy="192" r="22"/><circle cx="88" cy="258" r="15"/>
        <circle cx="242" cy="190" r="18"/><circle cx="300" cy="245" r="28"/><circle cx="362" cy="196" r="23"/><circle cx="378" cy="264" r="17"/>
      </g>
    </g>
  </g>
  <g transform="translate(760 160)" filter="url(#shadow)">
    <path d="M120 0h95v135h98v84H214v230h-94V219H22v-84h98z" fill="#e8f2fa" stroke="#ffffff" stroke-width="6"/>
    <circle cx="168" cy="86" r="34" fill="#0e315a"/>
    <rect x="70" y="400" width="270" height="66" rx="20" fill="#102541"/>
  </g>
  <text x="122" y="612" font-family="Arial" font-size="30" font-weight="900" fill="#ffffff">MICROSTRUCTURE AND FRACTURE ANALYSIS</text>

</svg>
